{% extends 'base.html' %}

{% block title %}حذف فريق | Smart Offer{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white"><i class="bi bi-exclamation-triangle"></i> تأكيد الحذف</div>
            <div class="card-body text-center">
                <p class="fs-5">هل أنت متأكد من حذف الفريق <strong>{{ object.name }}</strong>؟</p>
                <p class="text-muted">لا يمكن التراجع عن هذا الإجراء.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2">
                        <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> نعم، احذف</button>
                        <a href="{% url 'team-list' %}" class="btn btn-secondary">إلغاء</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
