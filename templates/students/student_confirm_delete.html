{% extends 'base.html' %}

{% block title %}تأكيد الحذف{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <i class="bi bi-exclamation-triangle"></i> تأكيد عملية الحذف
            </div>
            <div class="card-body">
                <p>هل أنت متأكد من رغبتك في حذف الطالب <strong>{{ object.get_full_name }}</strong>؟</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> نعم، احذف</button>
                    <a href="{% url 'student-list' %}" class="btn btn-outline-secondary"><i class="bi bi-x-lg"></i> إلغاء</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
