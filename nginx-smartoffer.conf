server {
    listen 80;
    server_name smartoffer.m3had-system.cloud 89.116.228.76;

    client_max_body_size 100M;

    location /static/ {
        alias /docker/smartoffer/staticfiles/;
    }

    location /media/ {
        alias /docker/smartoffer/media/;
    }

    location / {
        proxy_pass http://unix:/docker/smartoffer/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
